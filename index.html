<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latin Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 2rem;
      margin-bottom: 16px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    /* Mode selector */
    .mode-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-btn {
      padding: 10px 18px;
      border: 3px solid white;
      border-radius: 30px;
      background: transparent;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      font-weight: 600;
    }

    .mode-btn.active {
      background: white;
      color: #764ba2;
    }

    /* Score bar */
    .score-bar {
      color: white;
      font-size: 1.1rem;
      margin-bottom: 20px;
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .score-bar span { margin: 0 10px; }

    /* Card */
    .card {
      background: white;
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .card-label {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9c6dd1;
    }

    .card-word {
      font-size: 3rem;
      font-weight: 800;
      color: #2d2d2d;
      line-height: 1.1;
    }

    .card-answer {
      font-size: 2rem;
      font-weight: 700;
      color: #27ae60;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .btn:active { transform: scale(0.97); }

    .btn-show {
      background: #f39c12;
      color: white;
    }

    .btn-correct {
      background: #27ae60;
      color: white;
      display: none;
    }

    .btn-wrong {
      background: #e74c3c;
      color: white;
      display: none;
    }

    .btn-next {
      background: #667eea;
      color: white;
      display: none;
    }

    .card-counter {
      color: #aaa;
      font-size: 0.85rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <h1>🏛️ Latin Flashcards</h1>

  <div class="mode-bar">
    <button class="mode-btn" onclick="setMode('en-la')">English → Latin</button>
    <button class="mode-btn" onclick="setMode('la-en')">Latin → English</button>
    <button class="mode-btn active" onclick="setMode('random')">Random</button>
  </div>

  <div class="score-bar">
    <span>✅ Correct: <b id="scoreCorrect">0</b></span>
    <span>❌ Wrong: <b id="scoreWrong">0</b></span>
  </div>

  <div class="card">
    <div class="card-label" id="cardLabel">Translate to Latin</div>
    <div class="card-word" id="cardWord">Loading…</div>
    <div class="card-answer" id="cardAnswer"></div>
    <div class="card-counter" id="cardCounter"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-show"    id="btnShow"    onclick="showAnswer()">Show Answer</button>
    <button class="btn btn-correct" id="btnCorrect" onclick="markCorrect()">✅ Got it!</button>
    <button class="btn btn-wrong"   id="btnWrong"   onclick="markWrong()">❌ Missed it</button>
    <button class="btn btn-next"    id="btnNext"    onclick="nextCard()">Next Card →</button>
  </div>

  <script>
    let vocab = [];
    let mode = 'random';  // 'en-la' | 'la-en' | 'random'
    let currentIndex = -1;
    let cardCount = 0;
    let scoreCorrect = 0;
    let scoreWrong = 0;

    fetch('./vocabulary.json')
      .then(r => r.json())
      .then(data => {
        vocab = data;
        nextCard();
      })
      .catch(() => {
        document.getElementById('cardWord').textContent = 'Error loading vocabulary.json';
      });

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach((btn, i) => {
        btn.classList.toggle('active', ['en-la','la-en','random'][i] === m);
      });
      nextCard();
    }

    function nextCard() {
      // Pick random index, avoid repeating same card
      let next;
      do {
        next = Math.floor(Math.random() * vocab.length);
      } while (vocab.length > 1 && next === currentIndex);
      currentIndex = next;
      cardCount++;

      const entry = vocab[currentIndex];
      const effectiveMode = mode === 'random'
        ? (Math.random() < 0.5 ? 'en-la' : 'la-en')
        : mode;

      const label  = document.getElementById('cardLabel');
      const word   = document.getElementById('cardWord');
      const answer = document.getElementById('cardAnswer');

      if (effectiveMode === 'en-la') {
        label.textContent = 'Translate to Latin';
        word.textContent  = entry.english;
        answer.textContent = entry.latin;
      } else {
        label.textContent = 'Translate to English';
        word.textContent  = entry.latin;
        answer.textContent = entry.english;
      }

      answer.style.display = 'none';
      document.getElementById('cardCounter').textContent = `Card #${cardCount}`;

      document.getElementById('btnShow').style.display    = 'inline-block';
      document.getElementById('btnCorrect').style.display = 'none';
      document.getElementById('btnWrong').style.display   = 'none';
      document.getElementById('btnNext').style.display    = 'none';
    }

    function showAnswer() {
      document.getElementById('cardAnswer').style.display = 'block';
      document.getElementById('btnShow').style.display    = 'none';
      document.getElementById('btnCorrect').style.display = 'inline-block';
      document.getElementById('btnWrong').style.display   = 'inline-block';
      document.getElementById('btnNext').style.display    = 'inline-block';
    }

    function markCorrect() {
      scoreCorrect++;
      document.getElementById('scoreCorrect').textContent = scoreCorrect;
      nextCard();
    }

    function markWrong() {
      scoreWrong++;
      document.getElementById('scoreWrong').textContent = scoreWrong;
      nextCard();
    }
  </script>
</body>
</html>
